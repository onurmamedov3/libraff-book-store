spring.application.name=libraff-book-store

server.port=8080

spring.datasource.url=jdbc:h2:mem:db
spring.datasource.username=root
spring.datasource.password=1234


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql=trace


spring.jpa.defer-datasource-initialization=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.root=WARN
spring.output.ansi.enabled=ALWAYS

resilience4j.ratelimiter.instances.restockBook.limitForPeriod=5
resilience4j.ratelimiter.instances.restockBook.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.restockBook.timeoutDuration=0

resilience4j.ratelimiter.instances.employeeController.limitForPeriod=50
resilience4j.ratelimiter.instances.employeeController.limitRefreshPeriod=1m
resilience4j.ratelimiter.instances.employeeController.timeoutDuration=0

app.rateLimitPerMinute=5

jwt.secret=${JWT_SECRET}
jwt.refresh-secret=${JWT_REFRESH_SECRET}


spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true