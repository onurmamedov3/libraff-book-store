<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Libraff Book Store - Staff Portal</title>
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css'>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container" id="container">
        <div class="form-container reset-password-container">
            <form action="#" id="resetForm">
                <h1>Reset Password</h1>
                <span>Submit your details to IT Support</span>
                <input type="text" id="resetFin" placeholder="FIN Code (e.g. AZ11234)" required />
                <input type="email" id="resetEmail" placeholder="Corporate Email" required />
                <button type="submit">Request Reset</button>
            </form>
        </div>
        
        <div class="form-container sign-in-container">
            <form action="#" id="loginForm">
                <h1>Staff Login</h1>
                <span>Enter your system credentials</span>
                <input type="text" id="loginFin" placeholder="FIN Code (e.g. AZ11234)" required />
                <input type="password" id="loginPassword" placeholder="Password" required />
                <button type="submit">Sign In</button>
            </form>
        </div>
        
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Remembered?</h1>
                    <p>If you found your password, head back to the secure login screen.</p>
                    <button class="ghost" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Locked Out?</h1>
                    <p>If you forgot your password, our IT support team can help you reset it securely.</p>
                    <button class="ghost" id="resetPasswordBtn">Reset Password</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
